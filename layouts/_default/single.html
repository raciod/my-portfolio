{{ partial "header.html" . }}

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    /* ==========================================================================
       GLOBAL RESETS & BASE
       ========================================================================== */
    html, body {
        background-color: #1e1e2e !important;
        margin: 0 !important;
        padding: 0 !important;
        height: 100dvh !important; 
        overflow: hidden;
    }
    
    #content {
        background-color: #1e1e2e !important;
        padding: 0 !important;
        margin: 0 !important;
    }
    
    .terminal::after {
        content: none !important;
    }

    .terminal a {
        color: #89b4fa !important;
        text-decoration: underline !important;
        font-weight: bold !important;
    }
    .terminal a:hover {
        color: #a6e3a1 !important;
    }

    /* Core Window Structural Framework */
    .nvchad-window {
        display: flex; 
        flex-direction: column; 
        height: 100dvh; 
        justify-content: space-between; 
        font-family: monospace; 
        background-color: #1e1e2e; 
        color: #cdd6f4;
        box-sizing: border-box;
    }

    .main-area {
        flex-grow: 1; 
        overflow-y: auto; 
    }

    .empty-buffer {
        color: #45475a; 
        font-weight: bold; 
        margin-top: 1.5rem; 
        line-height: 1.6; 
    }

    /* Tabline & Statusline Shared Row Layout */
    .tabline, .statusline {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        box-sizing: border-box;
    }

    .status-left, .status-right {
        display: flex;
        align-items: center;
    }

    /* UI Component Styling */
    .tab-current {
        background-color: #313244; 
        color: #a6e3a1; 
        border-radius: 3px 3px 0 0; 
        font-weight: bold; 
    }

    .btn-home {
        text-decoration: none !important; 
        background-color: #f38ba8; 
        color: #11111b !important; 
        font-weight: bold; 
        border-radius: 3px;
        transition: background-color 0.2s ease;
    }
    .btn-home:hover {
        background-color: #f9e2af !important;
    }

    .statusline {
        background-color: #181825; 
        color: #cdd6f4; 
        font-weight: bold; 
        border-radius: 4px;
        overflow: hidden;
    }

    .status-mode {
        background-color: #b4befe; 
        color: #11111b; 
        text-transform: uppercase;
    }

    .status-location {
        background-color: #a6e3a1; 
        color: #11111b;
    }

    /* ==========================================================================
       1. DESKTOP ONLY TARGETING (Widths above 768px)
       ========================================================================== */
    @media (min-width: 769px) {
        .nvchad-window { padding: 15px 20px 25px 20px; }
        .tabline { margin-bottom: 1.5rem; border-bottom: 1px solid #313244; padding-bottom: 5px; }
        .tab-current { padding: 4px 10px; font-size: 0.9rem; }
        .btn-home { padding: 3px 10px; font-size: 0.85rem; }
        
        .statusline { font-size: 0.85rem; height: 32px; }
        .status-mode { padding: 6px 12px; }
        .status-file { color: #a6adc8; margin: 0 15px; }
        .status-title { background-color: #f38ba8; color: #11111b; padding: 6px 12px; margin-right: 0; }
        .status-location { padding: 6px 12px; }

        .terminal .content, .terminal p, .terminal ul, .terminal li, .terminal span { font-size: 1.1rem !important; line-height: 1.6 !important; }
        .terminal h1 { font-size: 1.4rem !important; margin-top: 0; }
        .empty-buffer { font-size: 1.1rem; }
    }

    /* ==========================================================================
       2. MOBILE OPTIMIZED TARGETING (Widths 768px and below)
       ========================================================================== */
    @media (max-width: 768px) {
        .nvchad-window { padding: 10px 12px 15px 12px; }
        
        /* Keep bars tightly horizontal, never stacked */
        .tabline { margin-bottom: 1rem; border-bottom: 1px solid #313244; padding-bottom: 6px; }
        .tab-current { padding: 4px 8px; font-size: 0.8rem; }
        .btn-home { padding: 4px 8px; font-size: 0.8rem; }
        
        /* Sleek single-line terminal status bar */
        .statusline { font-size: 0.75rem; height: 26px; }
        .status-mode { padding: 5px 8px; }
        
        /* Prevent long file strings from overflowing the layout */
        .status-file { 
            color: #a6adc8; 
            margin: 0 8px; 
            max-width: 110px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }
        
        /* Hide redundant page title element on small viewports to save space */
        .status-title { display: none; }
        .status-location { padding: 5px 8px; }

        /* Highly legible typography for direct phone reading */
        .terminal .content, .terminal p, .terminal ul, .terminal li, .terminal span {
            font-size: 1.15rem !important;
            line-height: 1.5 !important;
            white-space: pre-wrap !important; 
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
        }
        .terminal h1 { font-size: 1.4rem !important; margin-top: 0 !important; margin-bottom: 0.75rem !important; }
        .terminal h2 { font-size: 1.25rem !important; }
        .empty-buffer { font-size: 1.15rem; margin-top: 0.5rem; }
    }
</style>

<div class="nvchad-window">
  
  <div class="main-area">
    <div class="tabline">
      <span class="tab-current">
        » {{ if .File }}{{ .File.LogicalName }}{{ else }}{{ .Title | lower }}.md{{ end }}
      </span>

      <a href="/" class="btn-home">
        ⌂ <span>[Esc] Go Home</span>
      </a>
    </div>

    <div class="terminal">
      <span class="content" data-delay="{{ .Site.Params.Terminal.contentDelay | default 10 }}">
        {{ .Content }}
      </span>
    </div>
    
    <div class="empty-buffer">
      ~<br>~
    </div>
  </div>

  <div class="statusline">
    <div class="status-left">
      <span class="status-mode">NORMAL</span>
      <span class="status-file">{{ if .File }}{{ .File.LogicalName }}{{ else }}{{ .Title | lower }}.md{{ end }}</span>
    </div>
    
    <div class="status-right">
      <span class="status-title">{{ .Title }}</span>
      <span class="status-location">1/1</span>
    </div>
  </div>

</div>

{{ partial "footer.html" . }}
